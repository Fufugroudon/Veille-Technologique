<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="letterGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="32" height="32" rx="6" ry="6" fill="url(#bgGrad)"/>

  <!-- Border accent -->
  <rect width="32" height="32" rx="6" ry="6" fill="none" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.4"/>

  <!-- "L" letter - bold, centered, gradient -->
  <text
    x="7"
    y="24"
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="22"
    font-weight="900"
    fill="url(#letterGrad)"
    letter-spacing="-1"
  >L</text>

  <!-- Small accent dot bottom-right -->
  <circle cx="26" cy="25" r="2.5" fill="#3b82f6" opacity="0.8"/>
</svg>
