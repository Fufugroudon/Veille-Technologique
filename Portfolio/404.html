<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#060d1a">
  <title>404 — Page introuvable · Leseigneur Léo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ═══════════════════════ NAVIGATION ═══════════════════════ -->
  <nav id="navbar">
    <div class="container nav-container">
      <a href="index.html" class="nav-brand">
        <span class="brand-badge">LL</span>
        <span class="brand-name">Leseigneur Léo</span>
      </a>
    </div>
  </nav>

  <!-- ═══════════════════════ 404 MAIN ═══════════════════════ -->
  <main class="error-404-page">
    <div class="container error-404-container">
      <div class="error-404-terminal">
        <div class="error-404-titlebar">
          <span class="dot dot-red"></span>
          <span class="dot dot-yellow"></span>
          <span class="dot dot-green"></span>
          <span class="error-404-hostname">leo@portfolio:~$</span>
        </div>
        <div class="error-404-body">
          <p class="error-404-cmd"><span class="error-404-prompt">leo@portfolio:~$</span> get /page</p>
          <h1 class="glitch-404" data-text="404">404</h1>
          <p class="error-404-label">// Not Found</p>
          <p class="error-404-msg">La page que vous cherchez n'existe pas ou a été déplacée.</p>
          <p id="easter-egg-msg" class="error-404-egg" aria-live="polite"></p>
          <a href="index.html" class="btn btn-primary error-404-back">← Retour à l'accueil</a>
          <p class="error-404-hint">[ tapez <kbd>help</kbd> pour un message secret ]</p>
        </div>
      </div>
    </div>
  </main>

  <!-- ═══════════════════════ FOOTER ═══════════════════════ -->
  <footer>
    <div class="container footer-inner">
      <div class="footer-brand">
        <span class="brand-badge" aria-hidden="true">LL</span>
        <span>Leseigneur Léo</span>
      </div>
      <p class="footer-copy">&copy; 2025–2026 Leseigneur Léo — Tous droits réservés</p>
      <p class="footer-sub">Étudiant BTS SIO SISR</p>
    </div>
  </footer>

  <script src="404.js"></script>
</body>
</html>
