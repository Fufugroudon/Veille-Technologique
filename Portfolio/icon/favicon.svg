<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1a2540"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f8ef7"/>
      <stop offset="100%" stop-color="#3b7de8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="16" fill="url(#bg)"/>

  <!-- Subtle border -->
  <rect width="100" height="100" rx="16" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-opacity="0.25"/>

  <!-- L - vertical bar -->
  <rect x="22" y="18" width="14" height="52" rx="3" fill="url(#blue)"/>
  <!-- L - horizontal bar -->
  <rect x="22" y="57" width="38" height="13" rx="3" fill="url(#blue)"/>

  <!-- Dot aligned with baseline of L -->
  <circle cx="76" cy="63" r="8" fill="url(#blue)"/>
</svg>